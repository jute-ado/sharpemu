name: Build and Release

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "**/*.png"
      - "**/*.jpeg"
      - "**/*.jpg"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.png"
      - "**/*.jpeg"
      - "**/*.jpg"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Keep the generation explicit so a zombie runner from an older workflow
  # cannot indefinitely block releases after the pipeline itself is repaired.
  group: build-release-v2-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  init:
    name: Init
    runs-on: ubuntu-latest
    outputs:
      release-name: ${{ steps.vars.outputs.release-name }}
      release-tag: ${{ steps.vars.outputs.release-tag }}
      sbom-name: ${{ steps.vars.outputs.sbom-name }}
      safe-ref: ${{ steps.vars.outputs.safe-ref }}
      short-sha: ${{ steps.vars.outputs.short-sha }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute workflow variables
        id: vars
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          version="$(python3 -c 'import sys, xml.etree.ElementTree as ET; version = ET.parse("Directory.Build.props").getroot().findtext(".//SharpEmuVersion"); sys.exit("Directory.Build.props is missing SharpEmuVersion") if not version or not version.strip() else print(version.strip())')"
          release_tag="v${version}-${safe_ref}-${short_sha}"
          release_name="SharpEmu v${version} ${short_sha}"
          sbom_name="sharpemu-${version}-win-x64-${short_sha}.spdx.json"

          {
            echo "short-sha=${short_sha}"
            echo "safe-ref=${safe_ref}"
            echo "release-tag=${release_tag}"
            echo "release-name=${release_name}"
            echo "sbom-name=${sbom_name}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

  reuse:
    name: REUSE Compliance
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run REUSE lint
        uses: fsfe/reuse-action@v6

  build:
    name: Build Archive
    needs:
      - init
      - reuse
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      PUBLISH_DIR: ${{ github.workspace }}\artifacts\publish\win-x64
      RELEASE_DIR: ${{ github.workspace }}\artifacts\release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.103
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            Directory.Build.props

      - name: Restore solution
        run: dotnet restore SharpEmu.slnx

      - name: Build solution
        run: dotnet build SharpEmu.slnx -c Release --no-restore

      # Runs every test project in the solution; a test failure fails the build, as
      # does an aerolib.bin generation failure in the build step above (the MSBuild
      # task logs an error and returns false).
      - name: Run tests
        run: dotnet test SharpEmu.slnx -c Release --no-build --verbosity normal

      - name: Validate synthetic shaders
        run: dotnet run --project tools/SharpEmu.Tools.ShaderDump/SharpEmu.Tools.ShaderDump.csproj -c Release -- artifacts/shader-dump

      - name: Publish win-x64 CLI
        run: dotnet publish src/SharpEmu.CLI/SharpEmu.CLI.csproj -c Release -r win-x64 --self-contained true --no-restore -p:PublishDir="${env:PUBLISH_DIR}"

      - name: Generate SPDX SBOM
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: pwsh
        run: |
          $tool = Join-Path $env:RUNNER_TEMP 'sbom-tool.exe'
          Invoke-WebRequest `
            -Uri 'https://github.com/microsoft/sbom-tool/releases/download/v4.1.5/sbom-tool-win-x64.exe' `
            -OutFile $tool

          $expectedHash = '625767b371b7fdd58f40f618b8a86da0247a33c89e419039c86b4edba1dad4b5'
          $actualHash = (Get-FileHash -LiteralPath $tool -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "SBOM tool checksum mismatch: expected $expectedHash, received $actualHash"
          }

          & $tool generate `
            -b $env:PUBLISH_DIR `
            -bc $env:GITHUB_WORKSPACE `
            -pn 'SharpEmu' `
            -pv '${{ needs.init.outputs.version }}' `
            -ps 'SharpEmu Emulator Project' `
            -nsb "https://github.com/${env:GITHUB_REPOSITORY}"

          $manifest = Join-Path $env:PUBLISH_DIR '_manifest\spdx_2.2\manifest.spdx.json'
          if (-not (Test-Path -LiteralPath $manifest)) {
            throw "SBOM tool did not create $manifest"
          }

          New-Item -ItemType Directory -Path $env:RELEASE_DIR -Force | Out-Null
          Copy-Item `
            -LiteralPath $manifest `
            -Destination (Join-Path $env:RELEASE_DIR '${{ needs.init.outputs.sbom-name }}')

      - name: Create release archive
        run: |
          New-Item -ItemType Directory -Path $env:RELEASE_DIR -Force | Out-Null

          $archiveName = "sharpemu-${{ needs.init.outputs.version }}-win-x64.zip"
          $archivePath = Join-Path $env:RELEASE_DIR $archiveName
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path (Join-Path $env:PUBLISH_DIR '*') -DestinationPath $archivePath -CompressionLevel Optimal
          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archiveName" | Set-Content `
            -LiteralPath "${archivePath}.sha256" `
            -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: sharpemu-win-x64-${{ needs.init.outputs.short-sha }}
          path: |
            ${{ env.RELEASE_DIR }}\sharpemu-${{ needs.init.outputs.version }}-win-x64.zip
            ${{ env.RELEASE_DIR }}\sharpemu-${{ needs.init.outputs.version }}-win-x64.zip.sha256
            ${{ env.RELEASE_DIR }}\${{ needs.init.outputs.sbom-name }}
          if-no-files-found: error

  build-posix:
    name: Build ${{ matrix.rid }}
    needs:
      - init
      - reuse
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
    env:
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      PUBLISH_DIR: ${{ github.workspace }}/artifacts/publish/${{ matrix.rid }}
      RELEASE_DIR: ${{ github.workspace }}/artifacts/release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.103
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            Directory.Build.props

      - name: Restore solution
        run: dotnet restore SharpEmu.slnx

      - name: Build solution
        run: dotnet build SharpEmu.slnx -c Release --no-restore -warnaserror

      - name: Install SPIR-V validator
        if: matrix.rid == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libvulkan1 mesa-vulkan-drivers spirv-tools xvfb

      - name: Validate synthetic SPIR-V
        if: matrix.rid == 'linux-x64'
        run: scripts/validate-synthetic-shaders.sh artifacts/shader-dump

      - name: Execute synthetic Vulkan conformance
        if: matrix.rid == 'linux-x64'
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: scripts/execute-synthetic-shaders.sh artifacts/shader-dump

      - name: Test presenter render-target sampling
        if: matrix.rid == 'linux-x64'
        env:
          SHARPEMU_RUN_GPU_TESTS: 1
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: >-
          xvfb-run --auto-servernum
          dotnet test tests/SharpEmu.GpuTests/SharpEmu.GpuTests.csproj
          -c Release --no-build --verbosity normal

      # Also runs on Linux/macOS: the aerolib.bin MSBuild task does platform-sensitive
      # path handling, so a cross-platform generation regression surfaces here.
      - name: Run tests
        run: dotnet test SharpEmu.slnx -c Release --no-build --verbosity normal

      - name: Publish ${{ matrix.rid }} CLI
        run: dotnet publish src/SharpEmu.CLI/SharpEmu.CLI.csproj -c Release -r ${{ matrix.rid }} --self-contained true --no-restore -p:PublishDir="$PUBLISH_DIR"

      - name: Stage MoltenVK next to the build
        if: matrix.rid == 'osx-x64'
        run: scripts/fetch-macos-moltenvk.sh "$PUBLISH_DIR"

      - name: Create release archive
        run: |
          mkdir -p "$RELEASE_DIR"
          archive_name="sharpemu-${{ needs.init.outputs.version }}-${{ matrix.rid }}.tar.gz"
          # tar keeps the executable bit, which zip would drop.
          tar -czf "$RELEASE_DIR/$archive_name" -C "$PUBLISH_DIR" .
          (
            cd "$RELEASE_DIR"
            sha256sum "$archive_name" > "$archive_name.sha256"
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: sharpemu-${{ matrix.rid }}-${{ needs.init.outputs.short-sha }}
          path: |
            ${{ env.RELEASE_DIR }}/sharpemu-${{ needs.init.outputs.version }}-${{ matrix.rid }}.tar.gz
            ${{ env.RELEASE_DIR }}/sharpemu-${{ needs.init.outputs.version }}-${{ matrix.rid }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - init
      - build
      - build-posix
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release

      - name: Create or update release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NAME: ${{ needs.init.outputs.release-name }}
          RELEASE_TAG: ${{ needs.init.outputs.release-tag }}
          SBOM_NAME: ${{ needs.init.outputs.sbom-name }}
          VERSION: ${{ needs.init.outputs.version }}
        run: |
          mapfile -t assets < <(find release -type f \( \
            -name '*.zip' -o \
            -name '*.tar.gz' -o \
            -name '*.sha256' -o \
            -name '*.spdx.json' \
          \) | sort)
          expected=(
            "sharpemu-${VERSION}-win-x64.zip"
            "sharpemu-${VERSION}-win-x64.zip.sha256"
            "sharpemu-${VERSION}-linux-x64.tar.gz"
            "sharpemu-${VERSION}-linux-x64.tar.gz.sha256"
            "sharpemu-${VERSION}-osx-x64.tar.gz"
            "sharpemu-${VERSION}-osx-x64.tar.gz.sha256"
            "${SBOM_NAME}"
          )

          if [ "${#assets[@]}" -ne "${#expected[@]}" ]; then
            echo "Expected ${#expected[@]} release assets, found ${#assets[@]}." >&2
            printf 'Found: %s\n' "${assets[@]}" >&2
            exit 1
          fi

          for expected_name in "${expected[@]}"; do
            mapfile -t matches < <(find release -type f -name "${expected_name}")
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one ${expected_name}, found ${#matches[@]}." >&2
              exit 1
            fi
          done

          while IFS= read -r checksum; do
            (
              cd "$(dirname "${checksum}")"
              sha256sum --check "$(basename "${checksum}")"
            )
          done < <(find release -type f -name '*.sha256' | sort)

          notes="Automated SharpEmu v${VERSION} build for commit ${GITHUB_SHA}."

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_NAME}" --notes "${notes}"
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --title "${RELEASE_NAME}" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}"
          fi

          keep=()
          for asset_path in "${assets[@]}"; do
            keep+=("$(basename "${asset_path}")")
          done
          mapfile -t release_assets < <(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | sort)
          for asset in "${release_assets[@]}"; do
            case "${asset}" in
              sharpemu-${VERSION}-*)
                if ! printf '%s\n' "${keep[@]}" | grep -Fxq "${asset}"; then
                  gh release delete-asset "${RELEASE_TAG}" "${asset}" --yes
                fi
                ;;
            esac
          done
