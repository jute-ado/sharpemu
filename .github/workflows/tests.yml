name: Tests

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "**/*.png"
      - "**/*.jpeg"
      - "**/*.jpg"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.png"
      - "**/*.jpeg"
      - "**/*.jpg"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  test:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            src/**/packages.lock.json

      - name: Restore solution
        run: dotnet restore SharpEmu.slnx --locked-mode

      - name: Test with coverage
        if: ${{ runner.os == 'Linux' }}
        run: >-
          dotnet test SharpEmu.slnx
          -c Release
          --no-restore
          -warnaserror
          -p:DebugType=portable
          -p:DebugSymbols=true
          --logger trx
          --results-directory artifacts/test-results/${{ runner.os }}
          --collect:"XPlat Code Coverage"
          --settings tests/coverage.runsettings
          --blame-crash
          --blame-hang
          --blame-hang-timeout 2m

      - name: Summarize coverage
        if: ${{ runner.os == 'Linux' && !cancelled() }}
        shell: pwsh
        run: >-
          ./.github/scripts/Summarize-Coverage.ps1
          artifacts/test-results/Linux
          -BaselinePath ./.github/coverage-baseline.json

      - name: Test
        if: ${{ runner.os != 'Linux' }}
        run: >-
          dotnet test SharpEmu.slnx
          -c Release
          --no-restore
          -warnaserror
          --logger trx
          --results-directory artifacts/test-results/${{ runner.os }}
          --blame-crash
          --blame-hang
          --blame-hang-timeout 2m

      - name: Upload test diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ runner.os }}
          path: artifacts/test-results/${{ runner.os }}
          if-no-files-found: warn
          retention-days: 7
